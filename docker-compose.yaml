version: "3.8"

networks:
  media-network:
    name: media-network

services:
  subtitle-processor:
    image: subtitle-convert:latest
    container_name: subtitle-processor
    environment:
      - TZ=Asia/Taipei
      # arr API（/process-by-id 用 ID 查路徑，徹底避免檔名引號問題）
      # API key 從 .env 讀取，不要寫死在這裡
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      # bazarr 和 subtitle-processor 掛載路徑相同，不需要重映射
      # 若未來路徑不同時再啟用：
      # - REMAP_ROOT_FROM=/video
      # - REMAP_ROOT_TO=/volume1/video
    volumes:
      - /volume1/video:/video          # 與 bazarr 掛載相同路徑
    networks:
      - media-network
    restart: unless-stopped
    mem_limit: 1G
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6768/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s